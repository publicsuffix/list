name: CI

on:
- push
- pull_request

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 'stable'

      - name: Run Go unit tests
        run: go test -C ./tools -v .

      - name: Install dependencies
        run: sudo apt install -y autopoint

      - name: Run makefile tests
        run: make test

  psl-validation:
    name: PSL validation
    # check-pr needs a PR number, so this job only makes sense on
    # pull_request events. The unit-tests job above still runs on push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 'stable'

      - name: Run validations
        run: |
          cd tools
          go run ./psltool fmt -d ../public_suffix_list.dat && go run ./psltool check-pr --gh-owner ${{ github.event.repository.owner.login }} --gh-repo ${{ github.event.repository.name }} --online-checks ${{ github.event.pull_request.number }}
